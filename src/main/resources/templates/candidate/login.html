<!doctype html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Login do Candidato</title>
</head>
<body class="bg-gray-900 h-screen items-center flex justify-center"></body>
<form action="" class="flex gap-24" th:action="@{/candidate/signIn}"  method="post">
    <div class="text-white max-w-80 text-6xl flex items-center leading-tight">
            Gestão de Vagas
    </div>
    <div class="space-y-8 bg-zinc-950 roundend-md p-20">
        <input type="text" name="username" id="username" class="bg-gray-50 text-gray-900 text-xd rounded w-96 block p-4 focus:outline-none focus:ring-green-600 focus:ring-2" placeholder="Usuario">
        <input type="password" name="password" id="password" class="bg-gray-50 text-gray-900 text-xd rounded w-96 block p-4 focus:outline-none focus:ring-green-600 focus:ring-2" placeholder="Senha">

        <p class="text-red-400" th:if="${error_message}" th:text="${error_message}"></p>

        <button class="bg-green-900 w-96 p-4 rounded text-white hover:bg-green-700">Entrar</button>
        <a href="" class="block text-center text-green-700 underline underline-offset-2 hover:text-green-600"> Crie sua conta</a>
    </div>
</form>
</html>
